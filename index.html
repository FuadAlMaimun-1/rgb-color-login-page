<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>landing page</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section>
      <div class="login-box">
        <form>
          <h2>Sign In</h2>
          <div class="input-box">
            <span class="icon"
              ><ion-icon name="mail-open-outline"></ion-icon
            ></span>
            <input type="email" required />
            <label>Email</label>
          </div>
          <div class="input-box">
            <span class="icon">
              <ion-icon id="eyeIcon" name="eye-off-outline"></ion-icon>
            </span>

            <input type="password" id="password" required />
            <label>Password</label>
          </div>
          <div class="remember-forgot">
            <label><input type="checkbox" />Remember me</label>
            <a href="#">Forgot Password?</a>
          </div>

          <button type="submit">Login</button>

          <div class="register-link">
            <p>
              Don't have an acount? <a href="./signup.html">Sign Up</a>
            </p>
          </div>
        </form>
      </div>

      <script
        type="module"
        src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
      ></script>

      <script
        nomodule
        src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"
      ></script>

      <script>
        const password = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        eyeIcon.addEventListener("click", () => {
          if (password.type === "password") {
            password.type = "text";
            eyeIcon.setAttribute("name", "eye-outline");
          } else {
            password.type = "password";
            eyeIcon.setAttribute("name", "eye-off-outline");
          }
        });
      </script>
    </section>
  </body>
</html>
